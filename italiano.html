<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFF8F0">
<title>🇮🇹 Italiano per Spagnoli</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --cream:#FFF8F0;--paper:#FFFDF8;--ink:#2A2118;--ink2:#7A6B5E;
  --red:#CE2B37;--green:#2E8B57;--terra:#D4714A;--blue:#4A7FB5;--gold:#C99A2E;
  --ok:#5BA87A;--err:#CE4A5A;
  --sh:0 2px 14px rgba(42,33,24,.10);--sh2:0 6px 28px rgba(42,33,24,.16);
}
html,body{height:100%}
body{
  font-family:'Nunito',sans-serif;background:var(--cream);color:var(--ink);
  min-height:100dvh;max-width:480px;margin:0 auto;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(0,0,0,.025) 27px,rgba(0,0,0,.025) 28px);
}
#app{padding-bottom:76px;min-height:100dvh;position:relative}

/* NAV */
nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--paper);
  border-top:1.5px solid rgba(42,33,24,.07);display:flex;z-index:100;
  box-shadow:0 -4px 20px rgba(42,33,24,.08);
}
.nt{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:9px 4px 13px;cursor:pointer;border:none;background:none;
  color:var(--ink2);font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;
  letter-spacing:.02em;gap:2px;transition:color .2s;
}
.nt .ni{font-size:21px;transition:transform .2s;display:block}
.nt.act{color:var(--terra)}
.nt.act .ni{transform:scale(1.18)}

/* SCREENS */
.scr{display:none;padding:0 16px 20px;animation:si .25s ease}
.scr.act{display:block}
@keyframes si{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* COMMON */
.hd{padding:52px 0 18px;text-align:center}
.hd h1{font-family:'Playfair Display',serif;font-size:27px;font-weight:700;line-height:1.15}
.hd p{font-size:13px;color:var(--ink2);font-weight:600;margin-top:4px}
.card{background:var(--paper);border-radius:16px;padding:18px;box-shadow:var(--sh);margin-bottom:12px}
.sec{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--ink2);margin-bottom:10px}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800}
.t-terra{background:rgba(212,113,74,.13);color:var(--terra)}
.t-blue{background:rgba(74,127,181,.12);color:var(--blue)}
.t-green{background:rgba(46,139,87,.12);color:var(--green)}
.t-red{background:rgba(206,43,55,.11);color:var(--red)}
.t-gold{background:rgba(201,154,46,.13);color:var(--gold)}
.t-ok{background:rgba(91,168,122,.14);color:var(--ok)}
.btn{
  display:block;width:100%;padding:15px;border-radius:13px;border:none;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;
  transition:transform .15s,box-shadow .15s;text-align:center;
}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,var(--terra),#B55830);color:#fff;box-shadow:0 4px 16px rgba(212,113,74,.35);margin-bottom:10px}
.btn-b{background:linear-gradient(135deg,var(--blue),#3B6896);color:#fff;box-shadow:0 4px 14px rgba(74,127,181,.30);margin-bottom:10px}
.btn-g{background:linear-gradient(135deg,var(--ok),#489068);color:#fff;box-shadow:0 4px 14px rgba(91,168,122,.32);margin-bottom:10px}
.btn-gh{background:var(--paper);color:var(--ink);border:2px solid rgba(42,33,24,.10);margin-bottom:10px}
.divider{height:1px;background:rgba(42,33,24,.07);margin:12px 0}

/* ═══ HOME ═══ */
.flag{display:flex;align-items:center;gap:8px;padding:56px 16px 0}
.fb{height:6px;flex:1;border-radius:3px}
.fb.g{background:var(--green)}.fb.r{background:var(--red)}
.fe{font-size:30px}
.ht{font-family:'Playfair Display',serif;font-size:29px;font-weight:700;text-align:center;padding:10px 16px 4px;line-height:1.2}
.hs{text-align:center;color:var(--ink2);font-size:13px;font-weight:600;padding:0 16px 20px}
.streak-c{
  background:linear-gradient(135deg,#FFF3E8,#FFE5CE);
  border:2px solid rgba(212,113,74,.2);border-radius:18px;
  padding:18px 20px;display:flex;align-items:center;gap:14px;
  margin-bottom:12px;box-shadow:var(--sh);
}
.sf{font-size:46px}
.si h2{font-size:30px;font-weight:900;color:var(--terra);line-height:1}
.si p{font-size:12px;color:var(--ink2);font-weight:700;margin-top:2px}
.stats-r{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.sm{background:var(--paper);border-radius:13px;padding:13px 8px;text-align:center;box-shadow:var(--sh)}
.sm .v{font-size:23px;font-weight:900;display:block}
.sm .l{font-size:11px;color:var(--ink2);font-weight:700}
.due-c{
  background:linear-gradient(135deg,#EBF4FF,#D5E9FF);
  border:2px solid rgba(74,127,181,.22);border-radius:18px;
  padding:18px 20px;margin-bottom:12px;box-shadow:var(--sh);
}
.due-c h3{font-size:14px;color:var(--blue);font-weight:800;margin-bottom:6px}
.due-n{font-size:38px;font-weight:900;color:var(--blue);line-height:1}
.due-c p{font-size:12px;color:var(--ink2);font-weight:600;margin-top:4px}
.week-progress{
  background:var(--paper);border-radius:16px;padding:16px;box-shadow:var(--sh);margin-bottom:12px;
}
.week-progress h3{font-size:14px;font-weight:800;margin-bottom:10px}
.weeks-dots{display:flex;gap:6px;flex-wrap:wrap}
.wd{
  width:34px;height:34px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:800;transition:all .2s;
}
.wd.done{background:var(--green);color:#fff}
.wd.current{background:var(--terra);color:#fff;box-shadow:0 2px 8px rgba(212,113,74,.35)}
.wd.future{background:rgba(42,33,24,.07);color:var(--ink2)}

/* ═══ SESSION ═══ */
.sess-top{display:flex;align-items:center;gap:10px;padding:52px 16px 14px}
.pb-wrap{flex:1;height:8px;background:rgba(42,33,24,.08);border-radius:4px;overflow:hidden}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--terra),#E8856A);border-radius:4px;transition:width .4s ease}
.pb-txt{font-size:12px;font-weight:800;color:var(--ink2);white-space:nowrap}
.fc-wrap{perspective:1000px;margin:0 16px 18px;min-height:280px}
.fc{
  position:relative;width:100%;min-height:280px;cursor:pointer;
  transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);
  border-radius:20px;
}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{
  position:absolute;inset:0;backface-visibility:hidden;
  -webkit-backface-visibility:hidden;border-radius:20px;padding:26px 22px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:var(--sh);
}
.fc-front{background:var(--paper);border:2px solid rgba(42,33,24,.06)}
.fc-back{
  background:linear-gradient(145deg,#EFF9F4,#E0F4EA);
  border:2px solid rgba(91,168,122,.22);transform:rotateY(180deg);
}
.fc-topic{
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;
  padding:3px 10px;border-radius:20px;background:rgba(212,113,74,.12);
  color:var(--terra);margin-bottom:14px;
}
.fc-emoji{font-size:50px;margin-bottom:10px}
.fc-word{
  font-family:'Playfair Display',serif;font-size:34px;font-weight:700;
  color:var(--ink);text-align:center;margin-bottom:6px;line-height:1.15;
}
.fc-hint{font-size:13px;color:var(--ink2);font-weight:600;text-align:center}
.fc-tap{font-size:12px;color:var(--ink2);font-weight:700;margin-top:18px;opacity:.65}
.fc-trans{font-size:24px;font-weight:800;color:var(--ok);text-align:center;margin-bottom:10px}
.fc-ex{
  font-size:14px;color:var(--ink);text-align:center;font-style:italic;
  line-height:1.55;font-family:'Playfair Display',serif;margin-bottom:6px;
}
.fc-exes{font-size:13px;color:var(--ink2);text-align:center;font-weight:600}
.ans-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
.btn-wrong{
  background:linear-gradient(135deg,#FFE9E9,#FFCECE);color:#B03030;
  border:2px solid rgba(176,48,48,.18);font-weight:800;padding:14px;
  border-radius:13px;border:none;font-family:'Nunito',sans-serif;font-size:14px;
  cursor:pointer;transition:transform .15s;
}
.btn-right{
  background:linear-gradient(135deg,#E8F7EE,#CCEDDA);color:#1E7040;
  border:2px solid rgba(30,112,64,.18);font-weight:800;padding:14px;
  border-radius:13px;border:none;font-family:'Nunito',sans-serif;font-size:14px;
  cursor:pointer;transition:transform .15s;
}
.btn-wrong:active,.btn-right:active{transform:scale(.97)}
.sess-empty{text-align:center;padding:50px 20px}
.sess-empty .be{font-size:80px;margin-bottom:16px}
.sess-empty h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:8px}
.sess-empty p{font-size:13px;color:var(--ink2);font-weight:600;margin-bottom:20px}
.sess-done{padding:0 0 10px}
.done-c{
  background:linear-gradient(145deg,#E8F7EE,#D4F0E0);
  border:2px solid rgba(91,168,122,.3);border-radius:20px;
  padding:30px 22px;text-align:center;box-shadow:var(--sh);margin-bottom:12px;
}
.done-e{font-size:72px;margin-bottom:14px}
.done-c h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:6px}
.done-c p{font-size:13px;color:var(--ink2);font-weight:600}
.res-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.res-b{border-radius:13px;padding:14px;text-align:center}
.res-b .rn{font-size:32px;font-weight:900}
.res-b .rl{font-size:12px;font-weight:700;color:var(--ink2)}
.res-b.ok{background:rgba(91,168,122,.14)}.res-b.ok .rn{color:var(--ok)}
.res-b.err{background:rgba(206,74,90,.12)}.res-b.err .rn{color:var(--err)}
.box-inf{
  display:flex;align-items:center;gap:8px;background:rgba(74,127,181,.09);
  border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--blue);
  margin-top:8px;
}

/* ═══ PLAN ═══ */
.wk-card{background:var(--paper);border-radius:16px;overflow:hidden;box-shadow:var(--sh);margin-bottom:10px}
.wk-hdr{padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.wk-badge{
  width:40px;height:40px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:18px;flex-shrink:0;
}
.wk-i{flex:1}
.wk-i h3{font-size:14px;font-weight:800}
.wk-i p{font-size:12px;color:var(--ink2);font-weight:600}
.wk-arr{font-size:16px;color:var(--ink2);transition:transform .2s}
.wk-arr.open{transform:rotate(90deg)}
.wk-body{display:none;padding:0 16px 14px}
.wk-body.open{display:block}
.dy-item{display:flex;gap:10px;padding:7px 0;border-top:1px solid rgba(42,33,24,.05);font-size:12.5px}
.dy-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.dy-txt{flex:1;line-height:1.4}
.dy-txt strong{font-weight:800;display:block;font-size:13px}
.plan-legend{
  background:linear-gradient(135deg,#FFF3E8,#FFE5CE);border-radius:16px;
  padding:16px;margin-bottom:14px;box-shadow:var(--sh);
}
.plan-legend h3{font-size:14px;font-weight:800;margin-bottom:10px}
.leg-r{display:flex;align-items:center;gap:8px;font-size:12.5px;margin-bottom:6px;font-weight:600}

/* ═══ VOCAB ═══ */
.vtabs{display:flex;gap:8px;margin-bottom:14px}
.vt{
  flex:1;padding:10px;border-radius:12px;border:none;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;
  cursor:pointer;transition:all .2s;text-align:center;background:rgba(42,33,24,.06);color:var(--ink2);
}
.vt.act{color:white}
.vt.act.terra{background:var(--terra)}
.vt.act.blue{background:var(--blue)}
.vt.act.ok{background:var(--ok)}
.ff-c{
  background:var(--paper);border-radius:14px;padding:14px 16px;
  box-shadow:var(--sh);margin-bottom:10px;
}
.ff-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:8px}
.ff-lang{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.ff-word{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;line-height:1.2}
.ff-mean{font-size:12px;color:var(--ink2);font-weight:600}
.ff-arr{font-size:22px;color:var(--ink2)}
.ff-warn{
  background:rgba(201,154,46,.12);border-radius:8px;padding:7px 11px;
  font-size:12px;color:#7A5E0A;font-weight:700;display:flex;gap:6px;
  line-height:1.4;
}
.cog-c{
  background:var(--paper);border-radius:12px;padding:12px 14px;
  box-shadow:var(--sh);margin-bottom:8px;display:flex;align-items:center;gap:12px;
}
.cog-e{font-size:26px;flex-shrink:0}
.cog-w{flex:1}
.cog-it{font-family:'Playfair Display',serif;font-size:17px;font-weight:700}
.cog-es{font-size:12px;color:var(--ink2);font-weight:600}
.cog-n{font-size:11px;font-weight:800;padding:3px 8px;border-radius:20px;background:rgba(46,139,87,.11);color:var(--green);flex-shrink:0}

/* ═══ STATS ═══ */
.ring-w{display:flex;justify-content:center;padding:16px 0}
.boxes-g{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.bx{background:var(--paper);border-radius:12px;padding:11px 6px;text-align:center;box-shadow:var(--sh)}
.bx .bn{font-size:19px;font-weight:900;display:block}
.bx .bl{font-size:10px;color:var(--ink2);font-weight:700;line-height:1.3}
.acc-c{background:var(--paper);border-radius:14px;padding:14px 16px;box-shadow:var(--sh);margin-bottom:10px}
.acc-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid rgba(42,33,24,.06);font-size:13px}
.acc-row:first-child{border-top:none;padding-top:0}
.acc-val{font-weight:900;font-size:15px}

/* SETUP */
.setup{
  min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:32px 24px;text-align:center;
}
.setup-flag{font-size:80px;margin-bottom:20px;animation:bounce 1.2s infinite}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.setup h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:8px}
.setup p{font-size:14px;color:var(--ink2);font-weight:600;margin-bottom:6px;line-height:1.5}
.setup ul{text-align:left;margin:14px 0;padding:0 8px}
.setup ul li{font-size:13px;font-weight:600;padding:5px 0;display:flex;gap:8px;align-items:flex-start}
.setup-note{
  background:linear-gradient(135deg,#FFF3E8,#FFE5CE);border-radius:14px;
  padding:14px 16px;margin:16px 0;font-size:13px;font-weight:700;color:var(--terra);
  box-shadow:var(--sh);
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════

const VOCAB = [
  // SEMANA 1: Saluti e sopravvivenza

  {id:7,it:"per favore",es:"por favor",ex:"Un caffè, per favore.",exes:"Un café, por favor.",topic:"Basi",w:1,e:"☕"},

  {id:23,it:"figlio / figlia",es:"hijo / hija",ex:"La mia figlia ha dieci anni.",exes:"Mi hija tiene diez años.",topic:"Famiglia",w:2,e:"👶"},
  {id:24,it:"marito / moglie",es:"marido / esposa",ex:"Mio marito lavora a Milano.",exes:"Mi marido trabaja en Milán.",topic:"Famiglia",w:2,e:"💍"},
  {id:25,it:"grande / piccolo",es:"grande / pequeño",ex:"Roma è una città grande.",exes:"Roma es una ciudad grande.",topic:"Descrizione",w:2,e:"📏"},

// SRS ENGINE
// ═══════════════════════════════════════════════════
const BOX_INTERVALS = [0, 1, 3, 7, 14, 30]; // días por caja 1-5

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function addDays(dateStr, n) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}

function daysSince(dateStr) {
  if (!dateStr) return 0;
  const d = new Date(dateStr);
  const t = new Date();
  d.setHours(0,0,0,0); t.setHours(0,0,0,0);
  return Math.floor((t - d) / 86400000);
}

function initCardState(id) {
  return { box: 0, nextReview: todayStr(), reviews: 0 };
}

function answerCard(id, correct) {
  const st = S.cardStates[id] || initCardState(id);
  if (correct) {
    st.box = Math.min(5, st.box + 1);
    st.reviews++;
  } else {
    st.box = 1;
    st.reviews++;
  }
  const interval = BOX_INTERVALS[st.box] || 1;
  st.nextReview = addDays(todayStr(), interval);
  S.cardStates[id] = st;
  if (correct) S.totalCorrect = (S.totalCorrect||0) + 1;
  else S.totalWrong = (S.totalWrong||0) + 1;
  saveState();
}

function getDueCards() {
  const today = todayStr();
  const currentWeek = getCurrentWeek();
  const available = VOCAB.filter(c => c.w <= currentWeek);
  return available.filter(c => {
    const st = S.cardStates[c.id];
    if (!st) return true; // nunca vista
    return st.nextReview <= today;
  });
}

function getCurrentWeek() {
  if (!S.startDate) return 1;
  const days = daysSince(S.startDate);
  return Math.min(8, Math.ceil((days + 1) / 7));
}

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let S = {
  startDate: null,
  streak: 0,
  lastStudied: null,
  cardStates: {},
  totalCorrect: 0,
  totalWrong: 0,
};

function loadState() {
  try {
    const saved = localStorage.getItem('italiano_v2');
    if (saved) S = JSON.parse(saved);
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem('italiano_v2', JSON.stringify(S)); } catch(e) {}
}

function updateStreak() {
  const today = todayStr();
  if (S.lastStudied === today) return;
  const yesterday = addDays(today, -1);
  if (S.lastStudied === yesterday) {
    S.streak = (S.streak || 0) + 1;
  } else if (S.lastStudied !== today) {
    S.streak = 1;
  }
  S.lastStudied = today;
  saveState();
}

function goTo(s) {
  screen = s;
  if (s === 'session') startSession();
  render();
}

function startSession() {
  const due = getDueCards();
  if (due.length === 0) {
    session = { cards: [], idx: 0, flipped: false, correct: 0, wrong: 0, done: true };
    return;
  }
  // shuffle
  const shuffled = [...due].sort(() => Math.random() - .5);
  session = { cards: shuffled, idx: 0, flipped: false, correct: 0, wrong: 0, done: false };
}

function rSessionDone() {
  const acc = session.correct + session.wrong > 0 
    ? Math.round(session.correct / (session.correct + session.wrong) * 100) : 0;

function flipCard() {
  session.flipped = !session.flipped;
  const fc = document.getElementById('fc');
  if (fc) fc.classList.toggle('flipped', session.flipped);
  // Re-render answer buttons
  render();
  // Don't re-render, just update flip manually to avoid losing flip state
}

function answer(correct) {
  const card = session.cards[session.idx];
  answerCard(card.id, correct);
  if (correct) session.correct++; else session.wrong++;
  session.idx++;
  session.flipped = false;
  if (session.idx >= session.cards.length) {
    session.done = true;
    updateStreak();
  }
  render();
}

// ─── PLAN ───
function rPlan() {
  const currentWeek = getCurrentWeek();
  const wCards = PLAN.map((p,i) => {
    const w = i+1;
    const isOpen = openWeek === w;
    const isDone = w < currentWeek;
    const isCurrent = w === currentWeek;
    const status = isDone ? '✅' : isCurrent ? '▶️' : '🔒';
    const days = p.days.map(d => `
      <div class="dy-item">
        <div class="dy-dot" style="background:${p.color}"></div>
        <div class="dy-txt"><strong>${d.d} · ${d.t}</strong>${d.c}</div>
      </div>`).join('');
    return `
    <div class="wk-card">
      <div class="wk-hdr" onclick="toggleWeek(${w})">
        <div class="wk-badge" style="background:${p.bg}">${p.e}</div>
        <div class="wk-i">
          <h3>Semana ${w}: ${p.title}</h3>
          <p>${p.sub}</p>
        </div>
        <span class="wk-arr ${isOpen?'open':''}">${status} ${isOpen?'▾':'▸'}</span>
      </div>
      <div class="wk-body ${isOpen?'open':''}">${days}</div>
    </div>`;
  }).join('');

  return `
  <div class="hd"><h1>📅 Plan de 8 semanas</h1><p>Tu hoja de ruta hacia el nivel B1 🇮🇹</p></div>
  <div class="plan-legend">
    <h3>🧭 Cómo funciona</h3>
    <div class="leg-r">✅ <span>Semana completada</span></div>
    <div class="leg-r">▶️ <span>Semana actual — ¡aquí estás!</span></div>
    <div class="leg-r">🔒 <span>Semana pendiente — se desbloquea sola</span></div>
    <div class="leg-r">🔄 <span>El SRS te avisa qué repasar — no tienes que decidir</span></div>
  </div>
  ${wCards}`;
}

function toggleWeek(w) {
  openWeek = openWeek === w ? null : w;
  render();
}

// ─── VOCAB ───
function rVocab() {
  const ffHtml = FF.map(f => `
    <div class="ff-c">
      <div class="ff-row">
        <div>
          <div class="ff-lang" style="color:var(--green)">🇮🇹 Italiano</div>
          <div class="ff-word">${f.it}</div>
          <div class="ff-mean">= ${f.im}</div>
        </div>
        <div class="ff-arr">≠</div>
        <div>
          <div class="ff-lang" style="color:var(--red)">🇪🇸 Español</div>
          <div class="ff-word">${f.es}</div>
          <div class="ff-mean">= ${f.em}</div>
        </div>
      </div>
      <div class="ff-warn">⚠️ ${f.w}</div>
    </div>`).join('');

  const cogHtml = COG.map(c => `
    <div class="cog-c">
      <div class="cog-e">${c.e}</div>
      <div class="cog-w">
        <div class="cog-it">🇮🇹 ${c.it}</div>
        <div class="cog-es">🇪🇸 ${c.es}</div>
      </div>
      <div class="cog-n">${c.n}</div>
    </div>`).join('');

  const vocabBrowse = VOCAB.map(v => `
    <div class="cog-c">
      <div class="cog-e">${v.e}</div>
      <div class="cog-w">
        <div class="cog-it">🇮🇹 ${v.it}</div>
        <div class="cog-es">🇪🇸 ${v.es}</div>
      </div>
      <div style="font-size:10px;font-weight:800;padding:3px 7px;border-radius:20px;background:rgba(212,113,74,.12);color:var(--terra);flex-shrink:0">S${v.w}</div>
    </div>`).join('');

  return `
  <div class="hd"><h1>📚 Vocabulario libre</h1><p>Consulta cuando quieras · Sin presión</p></div>
  <div class="vtabs">
    <button class="vt ${vocabTab==='ff'?'act terra':''}" onclick="setVTab('ff')">⚠️ Falsos amigos<br>(${FF.length})</button>
    <button class="vt ${vocabTab==='cog'?'act blue':''}" onclick="setVTab('cog')">✨ Ya lo sabes<br>(${COG.length})</button>
    <button class="vt ${vocabTab==='all'?'act ok':''}" onclick="setVTab('all')">🗂️ Todo el vocab<br>(${VOCAB.length})</button>
  </div>
  ${vocabTab === 'ff' ? `
    <div style="background:rgba(206,43,55,.08);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;font-weight:700;color:var(--red)">
      ⚠️ Estos son los falsos amigos más peligrosos para un hispanohablante aprendiendo italiano. ¡Estúdialos bien! Los ✅ son verdaderos amigos.
    </div>
    ${ffHtml}` : ''}
  ${vocabTab === 'cog' ? `
    <div style="background:rgba(46,139,87,.08);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;font-weight:700;color:var(--green)">
      ✨ Estas palabras italianas son muy similares al español. ¡Ya las conoces casi todas sin haberlas estudiado!
    </div>
    ${cogHtml}` : ''}
  ${vocabTab === 'all' ? `
    <div style="background:rgba(74,127,181,.08);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;font-weight:700;color:var(--blue)">
      🗂️ Todo el vocabulario del programa. Semana indicada en naranja. Úsalo como referencia.
    </div>
    ${vocabBrowse}` : ''}`;
}

function setVTab(t) { vocabTab = t; render(); }

// ─── STATS ───
function rStats() {
  const currentWeek = getCurrentWeek();
  const totalAvailable = VOCAB.filter(c => c.w <= currentWeek).length;
  const seen = Object.keys(S.cardStates).length;
  const total = VOCAB.length;
  const correct = S.totalCorrect || 0;
  const wrong = S.totalWrong || 0;
  const acc = correct + wrong > 0 ? Math.round(correct/(correct+wrong)*100) : 0;

  // Box distribution
  const boxes = [0,0,0,0,0,0]; // box 0-5
  VOCAB.forEach(c => {
    const st = S.cardStates[c.id];
    if (st) boxes[st.box]++;
    else boxes[0]++;
  });

  const boxColors = ['#999','#D4714A','#C99A2E','#4A7FB5','#2E8B57','#CE2B37'];
  const boxLabels = ['🆕 Nueva','Caja 1\n1 día','Caja 2\n3 días','Caja 3\n7 días','Caja 4\n14 días','Caja 5\n30 días'];
  const boxHtml = boxes.map((n,i) => `
    <div class="bx">
      <span class="bn" style="color:${boxColors[i]}">${n}</span>
      <span class="bl">${boxLabels[i]}</span>
    </div>`).join('');

  const pct = total ? Math.round(seen/total*100) : 0;
  const circumference = 2 * Math.PI * 54;
  const offset = circumference - (pct/100 * circumference);

  return `
  <div class="hd"><h1>📊 Tu progreso</h1><p>Estadísticas de aprendizaje</p></div>
  <div class="ring-w">
    <svg width="140" height="140" class="ring">
      <circle cx="70" cy="70" r="54" fill="none" stroke="rgba(42,33,24,.08)" stroke-width="12"/>
      <circle cx="70" cy="70" r="54" fill="none" stroke="var(--terra)" stroke-width="12"
        stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
        stroke-linecap="round" transform="rotate(-90 70 70)"
        style="transition:stroke-dashoffset .8s ease"/>
      <text x="70" y="65" text-anchor="middle" font-size="22" font-weight="900" fill="var(--terra)">${pct}%</text>
      <text x="70" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="var(--ink2)">completado</text>
    </svg>
  </div>
  <div class="card">
    <div class="sec">📦 Distribución por cajas SRS</div>
    <div class="boxes-g">${boxHtml}</div>
    <div style="font-size:12px;color:var(--ink2);font-weight:600;text-align:center">
      Las cajas más altas = memoria más consolidada 🧠
    </div>
  </div>
  <div class="acc-c">
    <div class="sec">📈 Resumen general</div>
    <div class="acc-row"><span>📅 Semana actual</span><span class="acc-val" style="color:var(--terra)">S${currentWeek}/8</span></div>
    <div class="acc-row"><span>🔥 Racha</span><span class="acc-val" style="color:var(--terra)">${S.streak||0} días</span></div>
    <div class="acc-row"><span>👁️ Tarjetas vistas</span><span class="acc-val" style="color:var(--blue)">${seen} / ${total}</span></div>
    <div class="acc-row"><span>✅ Aciertos totales</span><span class="acc-val" style="color:var(--ok)">${correct}</span></div>
    <div class="acc-row"><span>❌ Fallos totales</span><span class="acc-val" style="color:var(--err)">${wrong}</span></div>
    <div class="acc-row"><span>🎯 Precisión global</span><span class="acc-val" style="color:${acc>=70?'var(--ok)':acc>=50?'var(--gold)':'var(--err)'}">${acc}%</span></div>
  </div>
  <div class="card">
    <div class="sec">🗓️ Hoja de ruta</div>
    <div style="font-size:13px;font-weight:600;color:var(--ink2);line-height:1.6">
      📅 Inicio: <strong>${S.startDate || '—'}</strong><br>
      🎯 Meta B1: 8 semanas · ~15-20 min/día<br>
      📦 Total vocab del programa: ${total} tarjetas<br>
      🔓 Desbloqueadas ahora: ${totalAvailable} tarjetas<br>
      📊 Ciencia: Sesiones cortas diarias > sesiones largas esporádicas
    </div>
  </div>
  <div style="margin-top:8px">
    <button class="btn btn-gh" onclick="if(confirm('¿Resetear TODO el progreso?'))resetAll()">🗑️ Resetear progreso (¡cuidado!)</button>
  </div>`;
}

function resetAll() {
  S = { startDate: null, streak: 0, lastStudied: null, cardStates: {}, totalCorrect: 0, totalWrong: 0 };
  saveState();
  screen = 'home';
  render();
}
