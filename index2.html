<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFF8F0">
<title>🇮🇹 Italiano per Spagnoli</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --cream:#FFF8F0;--paper:#FFFDF8;--ink:#2A2118;--ink2:#7A6B5E;
  --red:#CE2B37;--green:#2E8B57;--terra:#D4714A;--blue:#4A7FB5;--gold:#C99A2E;
  --ok:#5BA87A;--err:#CE4A5A;
  --sh:0 2px 14px rgba(42,33,24,.10);
}
html,body{height:100%}
body{
  font-family:'Nunito',sans-serif;background:var(--cream);color:var(--ink);
  min-height:100dvh;max-width:480px;margin:0 auto;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(0,0,0,.025) 27px,rgba(0,0,0,.025) 28px);
}
#app{padding-bottom:80px;min-height:100dvh}

/* NAV — 6 items */
nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--paper);
  border-top:1.5px solid rgba(42,33,24,.07);display:flex;z-index:100;
  box-shadow:0 -4px 20px rgba(42,33,24,.08);
}
.nt{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:8px 2px 12px;cursor:pointer;border:none;background:none;
  color:var(--ink2);font-family:'Nunito',sans-serif;font-size:9px;font-weight:800;
  letter-spacing:.01em;gap:2px;transition:color .2s;
}
.nt .ni{font-size:19px;transition:transform .2s;display:block}
.nt.act{color:var(--terra)}
.nt.act .ni{transform:scale(1.18)}

/* SCREENS */
.scr{display:none;padding:0 16px 20px;animation:si .25s ease}
.scr.act{display:block}
@keyframes si{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* COMMON */
.hd{padding:52px 0 16px;text-align:center}
.hd h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1.15}
.hd p{font-size:13px;color:var(--ink2);font-weight:600;margin-top:4px}
.card{background:var(--paper);border-radius:16px;padding:16px;box-shadow:var(--sh);margin-bottom:12px}
.sec{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--ink2);margin-bottom:10px}
.btn{display:block;width:100%;padding:14px;border-radius:13px;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:transform .15s;text-align:center}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,var(--terra),#B55830);color:#fff;box-shadow:0 4px 16px rgba(212,113,74,.35);margin-bottom:10px}
.btn-b{background:linear-gradient(135deg,var(--blue),#3B6896);color:#fff;box-shadow:0 4px 14px rgba(74,127,181,.30);margin-bottom:10px}
.btn-g{background:linear-gradient(135deg,var(--ok),#489068);color:#fff;margin-bottom:10px}
.btn-gh{background:var(--paper);color:var(--ink);border:2px solid rgba(42,33,24,.10);margin-bottom:10px}
.btn-gold{background:linear-gradient(135deg,#E8C84A,#C99A2E);color:#fff;box-shadow:0 4px 14px rgba(201,154,46,.35);margin-bottom:10px}
.divider{height:1px;background:rgba(42,33,24,.07);margin:10px 0}

/* HOME */
.flag{display:flex;align-items:center;gap:8px;padding:52px 16px 0}
.fb{height:6px;flex:1;border-radius:3px}
.fb.g{background:var(--green)}.fb.r{background:var(--red)}
.fe{font-size:28px}
.ht{font-family:'Playfair Display',serif;font-size:27px;font-weight:700;text-align:center;padding:8px 16px 2px;line-height:1.2}
.hs{text-align:center;color:var(--ink2);font-size:13px;font-weight:600;padding:0 16px 18px}
.streak-c{background:linear-gradient(135deg,#FFF3E8,#FFE5CE);border:2px solid rgba(212,113,74,.2);border-radius:18px;padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:12px;box-shadow:var(--sh)}
.sf{font-size:42px}
.si h2{font-size:28px;font-weight:900;color:var(--terra);line-height:1}
.si p{font-size:12px;color:var(--ink2);font-weight:700;margin-top:2px}
.stats-r{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.sm{background:var(--paper);border-radius:13px;padding:12px 8px;text-align:center;box-shadow:var(--sh)}
.sm .v{font-size:22px;font-weight:900;display:block}
.sm .l{font-size:11px;color:var(--ink2);font-weight:700}
.due-c{background:linear-gradient(135deg,#EBF4FF,#D5E9FF);border:2px solid rgba(74,127,181,.22);border-radius:18px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--sh)}
.due-c h3{font-size:14px;color:var(--blue);font-weight:800;margin-bottom:4px}
.due-n{font-size:36px;font-weight:900;color:var(--blue);line-height:1}
.due-c p{font-size:12px;color:var(--ink2);font-weight:600;margin-top:4px}
.unlock-c{background:linear-gradient(135deg,#FFFBE8,#FFF3CC);border:2px solid rgba(201,154,46,.25);border-radius:16px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--sh)}
.unlock-c h3{font-size:13px;font-weight:800;color:var(--gold);margin-bottom:6px}
.unlock-c p{font-size:12px;color:var(--ink2);font-weight:600;margin-bottom:10px;line-height:1.4}
.week-progress{background:var(--paper);border-radius:16px;padding:14px;box-shadow:var(--sh);margin-bottom:12px}
.week-progress h3{font-size:13px;font-weight:800;margin-bottom:10px}
.weeks-dots{display:flex;gap:5px;flex-wrap:wrap}
.wd{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;transition:all .2s}
.wd.done{background:var(--green);color:#fff}
.wd.current{background:var(--terra);color:#fff;box-shadow:0 2px 8px rgba(212,113,74,.35)}
.wd.unlocked{background:var(--gold);color:#fff;box-shadow:0 2px 8px rgba(201,154,46,.3)}
.wd.future{background:rgba(42,33,24,.07);color:var(--ink2)}

/* SESSION */
.sess-top{display:flex;align-items:center;gap:10px;padding:50px 16px 12px}
.pb-wrap{flex:1;height:8px;background:rgba(42,33,24,.08);border-radius:4px;overflow:hidden}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--terra),#E8856A);border-radius:4px;transition:width .4s ease}
.pb-txt{font-size:12px;font-weight:800;color:var(--ink2);white-space:nowrap}
.fc-wrap{perspective:1000px;margin:0 16px 16px;min-height:265px}
.fc{position:relative;width:100%;min-height:265px;cursor:pointer;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);border-radius:20px}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;padding:24px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:var(--sh)}
.fc-front{background:var(--paper);border:2px solid rgba(42,33,24,.06)}
.fc-back{background:linear-gradient(145deg,#EFF9F4,#E0F4EA);border:2px solid rgba(91,168,122,.22);transform:rotateY(180deg)}
.fc-topic{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;border-radius:20px;background:rgba(212,113,74,.12);color:var(--terra);margin-bottom:12px}
.fc-emoji{font-size:46px;margin-bottom:8px}
.fc-word{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--ink);text-align:center;margin-bottom:5px;line-height:1.15}
.fc-hint{font-size:13px;color:var(--ink2);font-weight:600;text-align:center}
.fc-tap{font-size:12px;color:var(--ink2);font-weight:700;margin-top:16px;opacity:.65}
.fc-trans{font-size:22px;font-weight:800;color:var(--ok);text-align:center;margin-bottom:8px}
.fc-ex{font-size:13px;color:var(--ink);text-align:center;font-style:italic;line-height:1.5;font-family:'Playfair Display',serif;margin-bottom:5px}
.fc-exes{font-size:12px;color:var(--ink2);text-align:center;font-weight:600}
.ans-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
.btn-wrong{background:linear-gradient(135deg,#FFE9E9,#FFCECE);color:#B03030;font-weight:800;padding:14px;border-radius:13px;border:none;font-family:'Nunito',sans-serif;font-size:14px;cursor:pointer;transition:transform .15s}
.btn-right{background:linear-gradient(135deg,#E8F7EE,#CCEDDA);color:#1E7040;font-weight:800;padding:14px;border-radius:13px;border:none;font-family:'Nunito',sans-serif;font-size:14px;cursor:pointer;transition:transform .15s}
.btn-wrong:active,.btn-right:active{transform:scale(.97)}
.sess-empty{text-align:center;padding:50px 20px}
.sess-empty .be{font-size:76px;margin-bottom:14px}
.done-c{background:linear-gradient(145deg,#E8F7EE,#D4F0E0);border:2px solid rgba(91,168,122,.3);border-radius:20px;padding:28px 20px;text-align:center;box-shadow:var(--sh);margin-bottom:12px}
.done-e{font-size:68px;margin-bottom:12px}
.done-c h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:5px}
.res-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.res-b{border-radius:13px;padding:13px;text-align:center}
.res-b .rn{font-size:30px;font-weight:900}
.res-b .rl{font-size:12px;font-weight:700;color:var(--ink2)}
.res-b.ok{background:rgba(91,168,122,.14)}.res-b.ok .rn{color:var(--ok)}
.res-b.err{background:rgba(206,74,90,.12)}.res-b.err .rn{color:var(--err)}

/* PLAN */
.wk-card{background:var(--paper);border-radius:16px;overflow:hidden;box-shadow:var(--sh);margin-bottom:10px}
.wk-hdr{padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.wk-badge{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.wk-i{flex:1}
.wk-i h3{font-size:13px;font-weight:800}
.wk-i p{font-size:11px;color:var(--ink2);font-weight:600}
.wk-arr{font-size:15px;color:var(--ink2);transition:transform .2s;flex-shrink:0}
.wk-arr.open{transform:rotate(90deg)}
.wk-body{display:none;padding:0 14px 12px}
.wk-body.open{display:block}
.dy-item{display:flex;gap:10px;padding:7px 0;border-top:1px solid rgba(42,33,24,.05);font-size:12.5px}
.dy-dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.dy-txt{flex:1;line-height:1.4}
.dy-txt strong{font-weight:800;display:block;font-size:12.5px}

/* VOCAB */
.vtabs{display:flex;gap:7px;margin-bottom:12px}
.vt{flex:1;padding:9px 4px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;transition:all .2s;text-align:center;background:rgba(42,33,24,.06);color:var(--ink2);line-height:1.3}
.vt.act{color:white}
.vt.act.terra{background:var(--terra)}
.vt.act.blue{background:var(--blue)}
.vt.act.ok{background:var(--ok)}
.ff-c{background:var(--paper);border-radius:14px;padding:13px 14px;box-shadow:var(--sh);margin-bottom:10px}
.ff-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:8px}
.ff-lang{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.ff-word{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;line-height:1.2}
.ff-mean{font-size:12px;color:var(--ink2);font-weight:600}
.ff-arr{font-size:20px;color:var(--ink2)}
.ff-warn{background:rgba(201,154,46,.12);border-radius:8px;padding:6px 10px;font-size:12px;color:#7A5E0A;font-weight:700;display:flex;gap:6px;line-height:1.4}
.cog-c{background:var(--paper);border-radius:12px;padding:11px 13px;box-shadow:var(--sh);margin-bottom:8px;display:flex;align-items:center;gap:11px}
.cog-e{font-size:24px;flex-shrink:0}
.cog-w{flex:1}
.cog-it{font-family:'Playfair Display',serif;font-size:16px;font-weight:700}
.cog-es{font-size:12px;color:var(--ink2);font-weight:600}
.cog-n{font-size:10px;font-weight:800;padding:3px 7px;border-radius:20px;background:rgba(46,139,87,.11);color:var(--green);flex-shrink:0}

/* GRAMMAR */
.gram-cat{background:var(--paper);border-radius:16px;overflow:hidden;box-shadow:var(--sh);margin-bottom:10px}
.gram-hdr{padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.gram-badge{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.gram-i{flex:1}
.gram-i h3{font-size:13px;font-weight:800}
.gram-i p{font-size:11px;color:var(--ink2);font-weight:600}
.gram-arr{font-size:15px;color:var(--ink2);transition:transform .2s;flex-shrink:0}
.gram-arr.open{transform:rotate(90deg)}
.gram-body{display:none;padding:0 14px 14px;border-top:1px solid rgba(42,33,24,.06)}
.gram-body.open{display:block}
.gram-section{margin-top:12px}
.gram-section h4{font-size:13px;font-weight:800;color:var(--terra);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.gram-section p{font-size:12.5px;line-height:1.6;color:var(--ink);font-weight:600;margin-bottom:8px}
.gram-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.gram-table th{background:rgba(212,113,74,.12);color:var(--terra);font-weight:800;padding:6px 8px;text-align:left;font-size:11px}
.gram-table td{padding:5px 8px;border-top:1px solid rgba(42,33,24,.06);font-weight:600}
.gram-table tr:nth-child(even) td{background:rgba(42,33,24,.025)}
.gram-ex{background:rgba(74,127,181,.08);border-left:3px solid var(--blue);padding:7px 10px;border-radius:0 8px 8px 0;font-size:12.5px;margin:6px 0;line-height:1.5}
.gram-ex .it{font-family:'Playfair Display',serif;font-style:italic;color:var(--ink);font-size:13px}
.gram-ex .es{font-size:12px;color:var(--ink2);font-weight:600}
.gram-tip{background:rgba(91,168,122,.1);border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700;color:#1E6040;margin:6px 0;display:flex;gap:6px;line-height:1.4}
.gram-warn{background:rgba(206,43,55,.08);border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700;color:var(--red);margin:6px 0;display:flex;gap:6px;line-height:1.4}
.gtag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:800;background:rgba(74,127,181,.12);color:var(--blue);margin:2px 2px}

/* STATS */
.ring-w{display:flex;justify-content:center;padding:14px 0}
.boxes-g{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:12px}
.bx{background:var(--paper);border-radius:11px;padding:10px 5px;text-align:center;box-shadow:var(--sh)}
.bx .bn{font-size:18px;font-weight:900;display:block}
.bx .bl{font-size:10px;color:var(--ink2);font-weight:700;line-height:1.3}
.acc-c{background:var(--paper);border-radius:14px;padding:13px 14px;box-shadow:var(--sh);margin-bottom:10px}
.acc-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid rgba(42,33,24,.06);font-size:13px}
.acc-row:first-child{border-top:none;padding-top:0}
.acc-val{font-weight:900;font-size:15px}

/* SETUP */
.setup{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
.setup-flag{font-size:76px;margin-bottom:18px;animation:bounce 1.2s infinite}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.setup h1{font-family:'Playfair Display',serif;font-size:25px;font-weight:700;margin-bottom:8px}
.setup-note{background:linear-gradient(135deg,#FFF3E8,#FFE5CE);border-radius:14px;padding:13px 14px;margin:14px 0;font-size:13px;font-weight:700;color:var(--terra);box-shadow:var(--sh)}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════

  {id:19,it:"rosso / blu / verde",es:"rojo / azul / verde",ex:"Ho una macchina rossa.",exes:"Tengo un coche rojo.",topic:"Colori",w:2,e:"🎨"},

  {id:23,it:"figlio / figlia",es:"hijo / hija",ex:"La mia figlia ha dieci anni.",exes:"Mi hija tiene diez años.",topic:"Famiglia",w:2,e:"👶"},
